<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('mpanolontsaina_theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.add('light');
          }
          
          var color = localStorage.getItem('mpanolontsaina_custom_primary');
          if (color) {
            var parsed = JSON.parse(color);
            var isDark = document.documentElement.classList.contains('dark');
            var l = isDark ? Math.min(parsed.l + 20, 90) : parsed.l;
            var hslStr = parsed.h + " " + parsed.s + "% " + l + "%";
            document.documentElement.style.setProperty('--primary', hslStr);
            document.documentElement.style.setProperty('--ring', hslStr);
            document.documentElement.style.setProperty('--primary-border', hslStr);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
